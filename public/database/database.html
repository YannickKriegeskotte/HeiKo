<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../utils/commons.css" />
    <link rel="stylesheet" href="database.css" />
    <link rel="icon" type="image/x-icon" href="../assets/HeiKoFavicon.png" />
    <!-- <link rel="stylesheet" href="../utils/commons.css" /> -->

    <script src="../lib/jquery-3.7.1.min.js"></script>
    <script type="module" src="databaseMain.js"></script>

    <title>HeiKo</title>
  </head>
  <body>

    <main class="content">
      <div class="content-header">
        <div class="header-left">
          <h1>Datenbank Einblicke</h1>
          <p>Alle Datenbank Werte im Überblick</p>
        </div>

        <div class="header-actions">
          
          <input class="search-input" type="text" id="search-input" placeholder="Suchen..."/>
          <button class="primary-btn" id="save-button">
            <img
              class="save-icon"
              src="../assets/save-icon.svg"
              alt=""
            />Speichern
          </button>
        </div>
      </div>

      <!-- Entry Cards -->

      <section class="card">
        <div class="card-header">
          <img class="database-icon" src="../assets/database.svg" alt="" />

          <div>
            <h2>Einträge <img class="question-icon" src="../assets/question.svg"  title="Bearbeite oder Suche Einträge"/></h2>
            <p id="entry-amount"></p>
          </div>
        </div>
        <!-- Card Grids via js-->
      </section>
    </main>
  </body>
</html>
