<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../utils/commons.css" />
    <link rel="stylesheet" href="database.css" />
    <link rel="icon" type="image/x-icon" href="../assets/HeiKoFavicon.png" />
    <!-- <link rel="stylesheet" href="../utils/commons.css" /> -->

    <script src="../lib/jquery-3.7.1.min.js"></script>
    <script type="module" src="databaseMain.js"></script>

    <title>HeiKo</title>
  </head>
  <body>
    <main class="content">
      <div class="content-header">
        <div class="header-left">
          <h1>Datenbank Einblicke</h1>
          <p>Alle Datenbank Werte im Überblick</p>
        </div>

        <div class="header-actions">
          <input
            class="search-input"
            type="text"
            id="search-input"
            placeholder="Suchen..."
          />
          <button class="primary-btn" id="save-button">
            <img
              class="save-icon"
              src="../assets/save-icon.svg"
              alt=""
            />Speichern
          </button>
        </div>
      </div>

      <!-- DATABASE CONTAINER -->
      <section class="database-container">
        <!-- YEAR HEADER -->

        <div class="year-header">
          <h2>2025</h2>

          <div class="latest-month">
            <span> Letzter hinzugefügter Monat: </span>

            <input type="text" value="06" readonly />
          </div>
        </div>

        <!-- MAIN AREA -->

        <div class="database-body">
          <!-- MONTH LIST -->

          <aside class="month-list">
            <h3>Monate</h3>

            <div class="months">
              <button class="month active">
                <span>[1]</span>
                Januar
              </button>

              <button class="month">
                <span>[2]</span>
                Februar
              </button>

              <button class="month">
                <span>[3]</span>
                März
              </button>

              <button class="month">
                <span>[4]</span>
                April
              </button>

              <button class="month">...</button>
            </div>
          </aside>

          <!-- SNAPSHOT -->

          <section class="snapshot-view">
            <h3>Daten des Monats</h3>

            <!-- WATER -->

            <div class="data-card water">
              <h4>💧 Wasser</h4>

              <div class="data-row">
                <label> Warmwasser OG </label>

                <input value="1234" />
              </div>

              <div class="data-row">
                <label> Kaltwasser OG </label>

                <input value="567" />
              </div>

              <div class="data-row">
                <label> Gesamtwasser </label>

                <input value="2000" />
              </div>

              <div class="data-row">
                <label> Druck Enthärtungsanlage </label>

                <input value="5" />
              </div>
            </div>

            <!-- HEATING -->

            <div class="data-card heating">
              <h4>🔥 Heizung</h4>

              <div class="data-row">
                <label> Betriebsstunden </label>

                <input value="400" />
              </div>

              <div class="data-row">
                <label> Verbrauch </label>

                <input value="300" />
              </div>

              <div class="data-row">
                <label> Druck </label>

                <input value="2" />
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
