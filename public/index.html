<body>
  <h1>HEKTAR</h1>
  <h2>Heimkosten Tracker & Auswerter</h2>

<div id="sectionSelection">
    <a href="energy.html" class="energySelection"><i class="fa fa-bolt fa-3x"></i></a>
    <a href="water.html" class="waterSelection"><i class="fa fa-droplet fa-3x"></i></a>

<div id="general" >
    <h2 class="sectionHeader">Allgemein</h2>
    <div class="apartmentContainer">
    <label class="preInputLabel" for="apartmentcount">Anzahl der zu verwaltenden Wohnungen</label>
    <input type="number" id="apartmentcount" name="apartmentcount" min="1" value="1">
    </div>
</div>

<div id="energy">
<h2 class="sectionHeader">Strom</h2>
</div>

<div id="water">
<h2 class="sectionHeader">Wasser</h2>
</div>

<div id="heating">
<h2 class="sectionHeader">Heizung</h2>
</div>


<div id="database">
<h2 class="sectionHeader">Datenbank Einblick</h2>
<table id="databaseTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Wert</th>
      <th>Neuer Name</th>
      <th>Neuer Wert</th>
      <th>Löschen</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>
