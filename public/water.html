<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>HEKTAR</title>
      <script>
      // Beim allerersten Rendern theme speichern
      const localTheme = localStorage.getItem('theme');
      if (localTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.style.backgroundColor = '#0f1c24'; // dunkler Fallback-Hintergrund
      } else {
        document.documentElement.style.backgroundColor = '#e4f6ff'; // heller Fallback-Hintergrund
      }
    </script>
    
   <link rel="stylesheet" href="water.css">
  <script src="lib/jquery-3.7.1.min.js"></script>
  <script type="module" src="main.js"></script>
</head>
<body>

      <input
        type="checkbox"
        id="appearanceToggleInput"
        class="appearanceToggleCheckbox"
      />
      <label for="appearanceToggleInput">
        <img class="dark-white-toggle-icon" src="./assets/circle-half-stroke-solid-full.svg" alt="Toggle Theme" />
      </label>
    </div>
  <h1>HEKTAR</h1>

        <div class="sectionSelectionIcon" id="indexTab"></div>

      <a href="heating.html" class="heatingSelection">

</body>
</html>
